services:
  db:
    image: postgres:15
    container_name: company_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: company_backend
    restart: always
    ports:
      - "7000:7000"
    environment:
      NODE_ENV: ${NODE_ENV}
      APP_ORIGIN: ${APP_ORIGIN}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_KEY: ${ADMIN_KEY}
    depends_on:
      - db

volumes:
  postgres_data: